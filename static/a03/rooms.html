<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <title>Chat – Rooms (Dashboard)</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Chat-App Dashboard</h1>
    <nav>
      <a href="profile.html">Profil</a>
      <a href="login.html">Abmelden</a>
    </nav>
  </header>

  <main>
    <section class="card">
      <h2>Willkommen zurück, <b>Benutzer!</b></h2>
      <p>Wähle einen Raum aus, um dem Chat beizutreten:</p>
    </section>

    <section class="card">
      <h2>Rooms</h2>
      <div class="rooms">
        <div class="room">
          <span>Raum 1</span>
          <span class="right">⚪</span>
        </div>
        <div class="room">
          <span>Raum 2</span>
          <span class="right">🟢 Online</span>
        </div>
        <div class="room">
          <span>Raum 3</span>
          <span class="right">⚪</span>
        </div>
      </div>
    </section>

    <section class="card">
      <h2>Benutzer online</h2>
      <p><b>12</b> Nutzer sind derzeit aktiv.</p>
    </section>

    <section class="card">
      <h2>Navigation</h2>
      <ul>
        <li><a href="chatroom.html">Zum Chatroom</a></li>
        <li><a href="profile.html">Zum Profil</a></li>
        <li><a href="login.html">Logout</a></li>
      </ul>
    </section>
  </main>

  <footer>
    <p>Chat-App Prototyp © 2025</p>
  </footer>
</body>
</html>
